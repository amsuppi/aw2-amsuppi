<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedimiento - Biblioteca</title>
    <link rel="stylesheet" href="/css/estilos.css" />
  </head>
  <body>
    <nav>
      <a href="/items">Libros</a>
      <a href="/procedimiento">Procedimiento</a>
      <a class="logout" href="/cerrar-sesion">Cerrar sesión</a>
    </nav>
    <main>
      <div class="card">
        <h1>Inventario</h1>
        <p class="explicacion">
          Aqui podras ver el catálogo de libros y ver estadísticas
          del inventario: cantidad total de títulos, promedio de páginas y
          promedio de precio.
        </p>
        <button type="button" id="btn-ejecutar">Ver catálogo</button>
        <div id="resultado" class="resultado" hidden></div>
      </div>
    </main>
    <script>
      const boton = document.getElementById("btn-ejecutar");
      const resultado = document.getElementById("resultado");

      boton.addEventListener("click", () => {
        resultado.hidden = false;
        resultado.textContent = "Ejecutando...";
        resultado.className = "resultado";

        fetch("/procedimientos/resumen-inventario")
          .then((response) => {
            if (!response.ok) {
              throw new Error("No autorizado");
            }
            return response.json();
          })
          .then((data) => {
            if (data.exito) {
              resultado.className = "resultado exito";
              resultado.innerHTML = `
                <strong>${data.mensaje}</strong>
                <ul>
                  <li>Total de libros: ${data.datos.totalLibros}</li>
                  <li>Promedio de precio: $${data.datos.promedioPrecio}</li>
                </ul>
              `;
            } else {
              throw new Error(data.mensaje);
            }
          })
          .catch((error) => {
            resultado.className = "resultado error";
            resultado.textContent =
              error.message || "Error al ejecutar el procedimiento.";
          });
      });
    </script>
  </body>
</html>
