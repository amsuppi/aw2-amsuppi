<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del libro - Biblioteca</title>
    <link rel="stylesheet" href="/css/estilos.css" />
  </head>
  <body>
    <nav>
      <a href="/items">Libros</a>
      <a href="/procedimiento">Procedimiento</a>
      <a class="logout" href="/cerrar-sesion">Cerrar sesión</a>
    </nav>
    <main>
      <div class="card">
        <h1>Detalle del libro</h1>
        <p id="estado">Cargando...</p>
        <dl class="detalle" id="detalle" hidden>
          <dt>Título</dt>
          <dd id="titulo"></dd>
          <dt>Autor</dt>
          <dd id="autor"></dd>
          <dt>Páginas</dt>
          <dd id="paginas"></dd>
          <dt>Precio</dt>
          <dd id="precio"></dd>
        </dl>
        <p><a href="/items">← Volver al catálogo</a></p>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const estado = document.getElementById("estado");
      const detalle = document.getElementById("detalle");

      if (!id) {
        estado.textContent = "Falta el parámetro id en la URL.";
      } else {
        fetch(`/api/v1/libros/${id}`)
          .then((response) => {
            if (response.status === 404) {
              throw new Error("No encontrado");
            }
            if (!response.ok) {
              throw new Error("No autorizado");
            }
            return response.json();
          })
          .then((libro) => {
            estado.hidden = true;
            detalle.hidden = false;
            document.getElementById("titulo").textContent = libro.titulo;
            document.getElementById("autor").textContent = libro.autor;
            document.getElementById("paginas").textContent = libro.paginas;
            document.getElementById("precio").textContent = `$${libro.precio}`;
          })
          .catch((error) => {
            estado.textContent =
              error.message === "No encontrado"
                ? "Libro no encontrado."
                : "Error al cargar el libro.";
          });
      }
    </script>
  </body>
</html>
