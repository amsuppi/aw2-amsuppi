<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del libro - Biblioteca</title>
    <link rel="stylesheet" href="/css/estilos.css" />
  </head>
  <body>
    <nav>
      <a href="/items">Libros</a>
      <a href="/procedimiento">Procedimiento</a>
      <a class="logout" href="/cerrar-sesion">Cerrar sesión</a>
    </nav>
    <main>
      <div class="card">
        <h1>Detalle del libro</h1>
        <p id="estado">Cargando...</p>
        <dl class="detalle" id="detalle" hidden>
          <dt>Título</dt>
          <dd id="titulo"></dd>
          <dt>Autor</dt>
          <dd id="autor"></dd>
          <dt>Páginas</dt>
          <dd id="paginas"></dd>
          <dt>Precio</dt>
          <dd id="precio"></dd>
        </dl>
        <p><a href="/items">← Volver al catálogo</a></p>
      </div>
    </main>
    <script src="item.js"></script>
  </body>
</html>
